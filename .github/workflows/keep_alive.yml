name: Keep Streamlit App Alive

on:
  schedule:
    # 頻度を少し上げて、4時間おき（1日6回）にするのも手です
    - cron: '0 */4 * * *'
  workflow_dispatch:

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Access Streamlit App
        # -L はリダイレクトを追いかけ、-s は余計なログを出さない設定です
        run: curl -L -s https://rekishi-ai-app-n58vasuxhabfuhsj8xjxmm.streamlit.app/ > /dev/null
