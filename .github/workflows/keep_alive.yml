name: Keep Streamlit App Alive

on:
  schedule:
    # 4時間おきに実行
    - cron: '0 */4 * * *'
  workflow_dispatch:

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Access Streamlit App
        # ブラウザのふり（User-Agent）を追加し、無限リダイレクトを防ぐため -L を外しています
        run: |
          curl -s -H "User-Agent: Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/120.0.0.0 Safari/537.36" \
          "https://rekishi-ai-app-n58vasuxhabfuhsj8xjxmm.streamlit.app/" > /dev/null
